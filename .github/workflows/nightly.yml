name: City research

on:
  schedule:
    # Every hour, around the clock. These runs share Hidde's Claude Pro
    # subscription, which has a rolling 5-hour usage window, so most attempts
    # hit the limit and stop after one turn. That is the design: a failed
    # attempt costs almost nothing, so knocking hourly lets the work through
    # whenever the window has room, and covers for GitHub's habit of delaying
    # or skipping scheduled triggers. Concurrency below stops overlap.
    #
    # Trade-off Hidde accepted: with no protected hours, a run can claim the
    # allowance shortly before he sits down to work. To carve out a working
    # block, replace this with ranges, e.g. "0 18-23 * * *" + "0 0-9 * * *"
    # to leave 10:00-18:00 UTC free.
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  actions: read

concurrency:
  group: nightly-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run the nightly workflow from CLAUDE.md
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running the autonomous nightly workflow for the Ancient Trees project.
            Read CLAUDE.md in the repository root and execute "The nightly workflow
            (autonomous run)" exactly as written: pick the next pending city from
            data/city-list.json, research thoroughly, verify every tree against two
            independent sources, write the stories in the required style, find
            open-license photos, save the city JSON, update data/city-list.json and
            CURATION.md, run python3 scripts/build_site.py to confirm the site still
            builds, and commit with the prescribed message format. Push the commit.
            Respect every hard rule in CLAUDE.md. One city per run, then stop.
          claude_args: |
            --allowedTools "Bash(git:*),Bash(python3:*),Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
