name: City research

on:
  schedule:
    # Every hour, around the clock. These runs share Hidde's Claude Pro
    # subscription, which has a rolling 5-hour usage window, so most attempts
    # hit the limit and stop after one turn. That is the design: a failed
    # attempt costs almost nothing, so knocking hourly lets the work through
    # whenever the window has room, and covers for GitHub's habit of delaying
    # or skipping scheduled triggers. Concurrency below stops overlap.
    #
    # Every hour, around the clock: Hidde is away, so nothing else is drawing on
    # the allowance and the runs may take all of it. Restore the protected
    # working block when he is back by replacing this with:
    #   - cron: "0 19-23 * * *"
    #   - cron: "0 0-7 * * *"
    # which leaves 10:00-21:00 Amsterdam free.
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  actions: read

concurrency:
  group: nightly-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run the research workflow from CLAUDE.md
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running the autonomous research workflow for the Ancient Trees
            project. Read CLAUDE.md in the repository root and execute "The research
            workflow (autonomous run)" exactly as written.

            Do not assume the job is to add a new city. Step 0 holds a priority
            ladder; work out which rung actually applies today and do that. A city
            below the quality floor outranks a new city, and reader submissions
            outrank everything. Adding a sixth city while the first five have
            unresolved pins is the wrong call, and the ladder is what says so.

            Whatever the work turns out to be: verify against two independent
            sources, follow TONE_OF_VOICE.md and SEO_GEO_BLUEPRINT.md, set
            location_precision on every tree you touch, run
            python3 scripts/build_site.py to confirm the site still builds and every
            contract validates, then commit, append to LOG.md, and push.

            Respect every hard rule in CLAUDE.md, including the mandate: the two
            ranked goals, the three question test for anything nobody wrote a rule
            for, and the hard list of five things that stay closed.

            Getting through the usage limit at all is the rare event here, so do not
            stop after one item. When a piece of work is finished, committed and
            pushed, go back to Step 0, pick the next rung, and keep going until the
            usage limit stops you or the clock runs out.

            Two rules on that, and they matter more than the throughput:
            - Finish and commit each item completely before starting the next. A
              half-researched city is worse than none. Never leave one part done.
            - Start no new item more than 60 minutes in. The job is killed at 90,
              and work killed mid-flight is work lost.
          claude_args: |
            --allowedTools "Bash(git:*),Bash(python3:*),Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
