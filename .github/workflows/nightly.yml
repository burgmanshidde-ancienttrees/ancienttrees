name: Nightly city research

on:
  schedule:
    # Hourly through the night: 20:00-03:00 UTC is 22:00-05:00 Amsterdam in
    # summer (an hour earlier in winter). These runs share Hidde's Claude Pro
    # subscription, which has a rolling 5-hour usage window, so most of these
    # attempts will hit the limit and stop after one turn. That is the design:
    # a failed attempt costs almost nothing, so knocking hourly lets the work
    # through whenever the window has room, and covers for GitHub's habit of
    # delaying or skipping scheduled triggers. Concurrency below stops overlap.
    - cron: "0 20-23 * * *"
    - cron: "0 0-3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  actions: read

concurrency:
  group: nightly-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run the nightly workflow from CLAUDE.md
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are running the autonomous nightly workflow for the Ancient Trees project.
            Read CLAUDE.md in the repository root and execute "The nightly workflow
            (autonomous run)" exactly as written: pick the next pending city from
            data/city-list.json, research thoroughly, verify every tree against two
            independent sources, write the stories in the required style, find
            open-license photos, save the city JSON, update data/city-list.json and
            CURATION.md, run python3 scripts/build_site.py to confirm the site still
            builds, and commit with the prescribed message format. Push the commit.
            Respect every hard rule in CLAUDE.md. One city per run, then stop.
          claude_args: |
            --allowedTools "Bash(git:*),Bash(python3:*),Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
